services:
  backend:
    build: .
    container_name: badminton-backend
    working_dir: /app
    # Run as the host user so bind-mounted files are readable/writable by the container
    # process. UID/GID come from the shell environment (bash sets these automatically).
    # If hot-reload has permission errors, run: export UID GID && docker compose up
    # LOCAL-ONLY PATCH (do not commit): user: line disabled on Windows where $UID/$GID
    # are not exported by PowerShell. Container runs as root; bind mount handles perms
    # via Docker Desktop's translation layer.
    # user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/app
      - pip-cache:/root/.cache/pip
      # LOCAL-ONLY PATCH (do not commit): mount inspect_clips for the video endpoint.
      - ./scratch/inspect_clips:/app/clips:ro
      # LOCAL-ONLY PATCH (do not commit): mount SCP'd collated tensors for
      # the real BST forward-pass path (src/api/bst_inference.py).
      - ./scratch/bst_inputs:/app/bst_inputs:ro
    ports:
      - "24082:8000"
      # MLflow port commented out for now. Aim is currently being used for experiment
      # tracking (see src/bst_refactor/run_tracker.py). If the team decides to use MLflow,
      # uncomment this and add an mlflow service to this compose file.
      # - "5000:5000"
    environment:
      - CORS_ORIGINS=http://localhost:5173,http://localhost:24082
      - UPLOAD_DIR=/app/uploads
      - BST_CLIPS_DIR=/app/clips

  frontend:
    image: node:20-alpine
    container_name: badminton-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - node-modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_TARGET=${VITE_API_TARGET:-http://backend:8000}
      - VITE_ALLOWED_HOSTS=${VITE_ALLOWED_HOSTS:-localhost}  
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  pip-cache:
  node-modules:
