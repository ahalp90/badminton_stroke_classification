# Base dev compose: builds the backend and runs the Vite dev server with HMR.
#
# Quickstart:
#   ./scripts/dev-setup.sh          # one-time bootstrap (env files, mount dirs)
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# This base file is intentionally machine-agnostic so a fresh clone runs without
# any host-specific paths. Local dataset mounts and the uploads-permission fix
# live in docker-compose.dev.yml (an opt-in overlay). Production is separate:
# see docker-compose.prod.yml and DEPLOYMENT.md.
#
# Live BRIC inference needs an NVIDIA GPU. For local GPU dev, drop an untracked
# docker-compose.override.yml next to this file (compose merges it automatically,
# no extra -f flag) reserving the device:
#   services:
#     backend:
#       deploy:
#         resources:
#           reservations:
#             devices:
#               - driver: nvidia
#                 count: all
#                 capabilities: [gpu]
# Without a GPU, BRIC is gated off by the registry and the rest runs as normal.
services:
  backend:
    build: .
    container_name: badminton-backend
    working_dir: /app
    volumes:
      - .:/app
      - pip-cache:/root/.cache/pip
    ports:
      - "24082:8000"
    environment:
      - CORS_ORIGINS=http://localhost:5173,http://localhost:24082
      - UPLOAD_DIR=/app/uploads
      - BST_CLIPS_DIR=/app/runtime/clips

  frontend:
    image: node:20-alpine
    container_name: badminton-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - node-modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      # Proxy target MUST be reachable from inside the frontend container, so it
      # is the backend SERVICE name, not localhost. Override via .env if needed.
      - VITE_API_TARGET=${VITE_API_TARGET:-http://backend:8000}
      # Comma-separated hosts the dev server accepts. Raw IPs are always allowed
      # by Vite; add hostnames here for LAN access. See frontend/.env.local.
      - VITE_ALLOWED_HOSTS=${VITE_ALLOWED_HOSTS:-localhost}
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  pip-cache:
  node-modules:
