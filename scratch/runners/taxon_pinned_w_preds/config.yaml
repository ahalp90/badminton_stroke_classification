session_name: taxon_pinned_w_preds_2026_05
# Six cells (cells 2 + 8 dropped: split_v2 is 14-class, so a keepunk taxonomy on
# split_v2 gives a dead class -- see the cells table in the refactor plan + the
# split_v2 design note). collation_id is shared across cells; split_column folds
# into the on-disk dir name (npy_{split}_{collation_id}) to keep the two bst_24
# cells apart. A training-time ablation tag would go in an optional per-cell
# `ablation_id:` (none of these cells use one).
