# Wall-clock estimate at ~25 min/serial on engelbart: 6x5 = 30 serials,
# ~13 hours (one overnight). After the runner finishes, prune the non-best
# serials' predictions npz per cell (keep predictions/<split>_serial_<best>.npz).
