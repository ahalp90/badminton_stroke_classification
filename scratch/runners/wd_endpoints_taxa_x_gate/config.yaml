    weight_decay: 0.01
    use_val_improvability_gate: true
    ablation_id: wd_1e-2_and_focal_revert_overallocated
    n_serials: 5

  - name: une_v1_14_v2_wd4e-1_gate
    taxonomy: une_v1_14
    split_column: split_v2
    collation_id: taxon_pinned_w_preds
