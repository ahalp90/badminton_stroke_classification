name: CI

# push is scoped to main so a same-repo PR doesn't run the whole suite twice.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      # Pinned (matches uv.lock) so a new ruff release can't fail CI on untouched code.
      - name: Install ruff
        run: pip install ruff==0.15.12
      - name: Run linting
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      # Mirror the Dockerfile: CPU torch from the explicit index first, then the pinned
      # requirements (torch left unpinned there, so pip skips the multi-GB CUDA wheels).
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
      - name: Run tests
        env:
          UPLOAD_DIR: /tmp/test_uploads
        run: |
          mkdir -p /tmp/test_uploads
          pytest

  # Self-skips (stays green) if frontend/ is removed. No `paths:` filter on purpose:
  # a path-filtered *required* check that never runs would block PRs forever.
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Detect frontend
        id: detect
        run: |
          if [ -f frontend/package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No frontend/package.json -- skipping (this is fine)."
          fi
      - uses: actions/setup-node@v6
        if: steps.detect.outputs.present == 'true'
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install, lint and build
        if: steps.detect.outputs.present == 'true'
        working-directory: frontend
        run: |
          npm ci
          npm run lint || echo "::warning title=frontend eslint::eslint reported issues (non-blocking)"
          npm run build

  # Smoke-test the prod Dockerfiles build (no push) -- catches breakage in the PR.
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Build backend image (CPU torch, no push)
        run: docker build --build-arg TORCH_INDEX=cpu -t badminton-backend:ci .
      - name: Build frontend image (no push)
        run: |
          if [ -f frontend/Dockerfile ]; then
            docker build -t badminton-frontend:ci ./frontend
          else
            echo "No frontend/Dockerfile -- skipping (this is fine)."
          fi
