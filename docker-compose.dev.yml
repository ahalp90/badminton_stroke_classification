# Local dev overlay. Opt-in: layer it on top of the base file.
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# This file holds everything that used to live in machine-specific, out-of-repo
# overrides. It is committed so the whole team gets the same dev behaviour, but
# the paths it mounts are created empty by ./scripts/dev-setup.sh and populated
# manually (see HANDOVER.md "Data provenance"). With the dirs empty the app
# still boots; only clip playback and live per-clip inference stay unavailable.
services:
  backend:
    volumes:
      # Sample clips for the video endpoint. Empty until you drop clips in.
      - ./scratch/inspect_clips:/app/runtime/clips:ro
      # Collated tensors for the real BST forward pass (src/api/bst_x_inference.py).
      # Obtained out-of-band; see HANDOVER.md. Empty dir => live inference off.
      - ./scratch/bst_x_inputs:/app/bst_x_inputs:ro
      # Keep uploads in a named volume rather than the bind mount. On some hosts
      # (e.g. FUSE/mergerfs mounts) the container user cannot write to a
      # bind-mounted uploads dir; the named volume sidesteps that, like prod.
      - uploads:/app/uploads

volumes:
  uploads:
