notes: |-
  bst_12, v2 split (the 12 base BST strokes, side-agnostic)

  Best S4 0.821 / 0.631 / 0.828, mean 0.812 / 0.599 / 0.822 (macro / min / acc; val macro 0.851).

  Best macro on the v2 split, unsurprisingly since it has the fewest classes. Top macro of the batch.

  Compared with bst_24 v2 split shows that the nosides collapse only gives a minimal performance boost.
  bst_24 v2 did Best S3 0.816 / 0.571 / 0.828, mean 0.809 / 0.534 / 0.822 (macro / min / acc; val macro 0.848).
  Justifies that collapsing classes is a free generalisation boost, however minimal. Implies the model had learned to correlate the top/bottom variants and allocate shared weight templates.
