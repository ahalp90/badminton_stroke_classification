notes: |
  Phase 2 sanity train, run 1 of 3 (combo C: merged_25 +
  split_bst_baseline + dropunk). First training on the unified
  sticky_anchor mmpose clean dir over the full 32,203-stem extract.
  Direct comparison vs Phase-1 baseline run_20260418_151139 (same
  combo, same 80ep/fade-15 hparams).
  Best S2 (top accuracy 0.849, macro 0.831, min 0.577, top-2 0.968).
  Mean macro 0.831 (+0.003 vs Phase-1), min 0.577 (-0.023),
  acc 0.848 (+0.004), top-2 0.969 (+0.005). Essentially tied; min F1
  bottleneck remains Top_drive / Bottom_push.
  Seed variance tightens meaningfully: macro range 0.006 vs Phase-1's
  0.016 (2.7x tighter), acc range 0.005 vs 0.012 (2.4x), min range
  0.024 vs 0.030 (1.3x). Means tied, spread halved+; cleaner pose
  data reduces seed lottery on bottleneck classes (same direction as
  run_20260425_185421's collapsed-classes ablation).
  num_strokes=3335 (Phase-2) vs 3486 (Phase-1): different test
  denominators because of the unknown-drop on the cleaned mmpose dir.
