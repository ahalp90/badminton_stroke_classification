notes: |
  Follow-up to the first CDB-F1 run (run_20260501_164658), gamma
  flipped from 1 to 0; alpha shape unchanged. Ran on bourbaki
  alongside engelbart's tau=0.5 follow-up run_20260501_192519.
  Wanted to check if gamma=1 was costing the easy classes. Best S1
  (top min 0.494, only seed clearing 0.49; macro 0.743, acc 0.758,
  top-2 0.936). Mean macro 0.7401, min 0.4342, acc 0.7586,
  top-2 0.9354.

  Vs the first run mean (0.7432/0.4621/0.7617/0.9351): macro -0.3,
  min -2.8, acc -0.3, top-2 +0.0. So gamma=1 was carrying the
  bottleneck lift: ws dropped 2.8% without it, push -2.6% too.
  Smash +2.5, drive +2.5 once ws stopped hogging recall; rush
  dropped another 1.9%, didn't expect that. Easy classes flat. S1
  ws 0.494 just edges past the first run's S2 (0.486) but on a
  worse macro / acc seed; class-weighted S2 (0.518) still holds
  the project ws ceiling.
