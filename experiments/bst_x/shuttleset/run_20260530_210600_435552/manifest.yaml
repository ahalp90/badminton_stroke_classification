notes: |-
  bst_25, baseline split, unknown kept (original bst split w/ unknown)

  Best S1 0.830 / 0.656 / 0.843, mean 0.824 / 0.620 / 0.841 (macro / min / acc; val macro 0.825).

  vs drop-unknown bst_24 (run_20260530_225714_593038, same split): keeping unknown drops performance on the 24 real strokes: 0.35% test macro, 1.1% val.
  Nearly all the f1 loss is the service classes, the worst down by ~11pp (Top_long_service, down to 0.88). Services lose up to 14% of truths to unknown.
  The other 20 classes actually improve slightly with unknown kept (+0.7% as a group).
  Unknown itself was a high performing class (~0.85 test f1, recall 0.91 / precision 0.79).

  Confusion matrix: scratch/architecture_notes/confusion_bst25_baseline_keep_unknown_S1.png.
