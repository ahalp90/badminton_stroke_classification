notes: |
  Phase 2 sanity train, run 2 of 3 (combo B: une_merge_v1 +
  split_v2 + dropunk) on the unified sticky_anchor mmpose clean
  dir. Best S4 (top macro 0.743, top acc 0.770, top top-2 0.944,
  min 0.245 on Top_wrist_smash). Mean macro 0.739 (-0.002 vs V4
  baseline run_20260420_171101 mean), min 0.317 (-0.072), acc
  0.766 (0.000), top-2 0.938 (+0.002).
  Mean min F1 drops ~7 pp from Phase-1 despite cleaner pose
  data: macro / acc / top-2 hold steady, but Top_wrist_smash
  gets worse with sticky_anchor cleaning, not better. Same
  direction as Phase-1 sticky_anchor mixed retrain
  run_20260425_150548. Min metric is dominated by ~600-sample
  Top_wrist_smash class with seed range 0.128, so headline pick
  follows the macro / acc / top-2 trio. Run 3 (combo A
  une_merge_v1_nosides) will test whether collapsing the side
  prefix recovers the wrist_smash floor the same way the
  Phase-1 collapsed-classes ablation (run_20260425_185421) did.
