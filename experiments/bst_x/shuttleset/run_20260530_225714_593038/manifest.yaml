notes: |-
  bst_24, baseline split, unknown dropped (original bst split w/o unknown)

  Best S5 0.842 / 0.612 / 0.853, mean 0.827 / 0.568 / 0.842 (macro / min / acc; val macro 0.832).

  Unknown (vs keep-unknown bst_25, run_20260530_210600_435552, same split): dropping it lifts the 24 real strokes +0.35% test macro, +1.1% val.

  The four service classes recover significant f1 (~11pp Top_long_service, ~4.5pp Bottom_long_service and Top_short_service, ~2.2pp Bottom_short_service). Confusion matrices show these were the main confusion classes with unknown kept in.

  Possibly service classes were overconcentrated in 'unknown'. Unknown itself was a high performing class (~0.85 test f1).

  Confusion matrices: docs/architecture_notes/confusion_bst25_baseline_keep_unknown_S1.png (unknown kept, shows the bleed) and confusion_bst24_baseline_drop_unknown_S5.png (unknown dropped, services clean).
