# Production compose file, used on the server for the demo.
# Run with: docker compose -f docker-compose.prod.yml up --build -d
#
# Architecture:
#   backend:  FastAPI (single worker - in-memory job store is not shared across processes)
#   frontend: builds the React app and serves it via nginx.
#             nginx also proxies /api/* to the backend so everything
#             is on a single port (26138), which cloudflared then tunnels.

services:
  backend:
    build: .
    container_name: badminton-backend
    working_dir: /app
    volumes:
      # Host dataset directory, mounted read-only for inference.
      # Set DATA_HOST_DIR in a .env file (see .env.example); compose reads it
      # automatically. Comment this mount out to run without the dataset
      # (e.g. a frontend-only smoke test).
      - ${DATA_HOST_DIR:?set DATA_HOST_DIR in .env to your dataset path}:/data:ro
      # Named volume for uploads so files survive container restarts
      - uploads:/app/uploads
    environment:
      # In prod, same-origin requests through nginx so CORS is not needed,
      # but set to * as a safety net in case anything calls the API directly.
      - CORS_ORIGINS=*
      - DATA_DIR=/data
      # Where the SCP'd live-inference tensors live inside the container.
      # The code expects: $BST_INPUTS_DIR/{test,val}/{JnB_bone,pos,shuttle,videos_len}.npy
      # If your DATA_HOST_DIR points directly at a `bst_inputs` tree (with
      # test/ and val/ at its root), `/data` is correct. If it points at a
      # parent that contains a `bst_inputs/` folder, change this to
      # `/data/bst_inputs`. Without this set, the per-clip browser and the
      # "Errors only" filter stay hidden (live=false on every model).
      - BST_INPUTS_DIR=/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 1
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: badminton-frontend
    ports:
      # Using a non-standard port as the server runs many services and common ports are likely taken.
      # Cloudflare Tunnel points at this port; change it here if it conflicts with something else.
      - "26138:80"
    volumes:
      # Mount the nginx config so routing rules live in the repo, not the image
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  uploads:
