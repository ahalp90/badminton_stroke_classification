  SET 2: focal_alpha_revert on, at wd 1e-2 and 4e-1, on shuttleset/v2, bst_25/baseline and une/v2. The comparison is the same wd with focal_alpha_revert off (SET 1, and #40/#47 for une). Same arm as Series H, now at the two wd endpoints.

  Best serial / 5-serial mean, test (macro / min), with focal_alpha_revert-off mean min alongside:

    cell            wd    best (on)         mean (on)      mean min, off
    shuttleset/v2   1e-2  S2 0.652 / n/a    0.648 / n/a    n/a
    shuttleset/v2   4e-1  S1 0.658 / n/a    0.648 / n/a    n/a
    bst_25/baseline 1e-2  S5 0.826 / 0.609  0.822 / 0.595  0.548
    bst_25/baseline 4e-1  S2 0.829 / 0.630  0.821 / 0.574  0.614
    une/v2          1e-2  S3 0.755 / 0.482  0.738 / 0.478  0.485
    une/v2          4e-1  S2 0.753 / 0.503  0.748 / 0.482  0.498
    (une/v2 4e-1 mean is over 4 serials, no S5; shuttleset min is driven_flight, n/a)

  focal_alpha_revert on did not give the best setting on any of the three. The only place it raised min-F1 was bst_25 at wd 1e-2 (0.548 off to 0.595 on), and that still sits below the old standard's 0.620. Everywhere else it was flat or down: une lost min-F1 at both endpoints (0.485 to 0.478 at 1e-2, 0.498 to 0.482 at 4e-1), and shuttleset_18's min-F1 is driven_flight and not meaningful. Macro stayed flat, as in SET 1.

  Second batch after Series H to show focal_alpha_revert adds nothing beyond noise, so it can come out of the hp config.

  focal_alpha_revert-off references: une wd 4e-1 run_20260601_021234_940276 (#47); SET 1 cells at the matching wd.
