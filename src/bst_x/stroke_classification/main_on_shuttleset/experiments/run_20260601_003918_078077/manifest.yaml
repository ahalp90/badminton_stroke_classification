  Best S2 0.749 / 0.483, mean 0.744 / 0.475 (test macro / min).

  Excluding norms, bias and embeddings from weight decay produced a new high on the une_v1_14 taxonomy (split_v2) at baseline 1e-2 wd: best macro/min +0.001 / +0.016; mean macro/min +0.003 / +0.014.

