notes: |-
  Best S3 0.826 / 0.652, mean 0.819 / 0.615 (test macro / min).

  focal_alpha_revert_overallocated hardly shifts anything across most taxonomies. The only noticeable difference is on une_v1_14 / v2, which is the taxonomy it was primarily built to target due to the alpha saturation across the smash classes. Here it noticeably lifts mean min-F1 (+0.016). Otherwise, pulls down single-best serial results on macro and min across all taxons except shuttleset_18 (best within noise at +0.002). Reduced mean-vs-best diff suggests it slightly regularises seed variation.
