notes: |
  Combo A nosides + LS=0.0 + adaptive_focal {tau=1, gamma=1,
  momentum=0.9, warm_up=5, f1_floor=0, pair_caps=[{smash,
  wrist_smash, ratio=0.7}]}. Same as the first CDB-F1 run
  (run_20260501_164658) plus the cap.

  The cap forces alpha[smash] >= 0.7 * alpha[wrist_smash] each
  epoch, after the standard renormalisation. Whatever bump is
  needed to lift alpha[smash] to the threshold gets subtracted
  uniformly from the other 12 classes, so mean alpha stays 1.0.
  Reason it exists: scalar CDB-F1 alpha tracks per-class F1 but
  can't see pair confusion. When ws gets high alpha (because its
  F1 is low), the gradient pushes the model toward predicting ws
  over smash on the ambiguous samples. The cap was supposed to
  claw back the 5.5% smash lost in run_20260501_164658 while ws
  held within 1% of its +4% lift.

  Best S4 (macro 0.748, acc 0.767, top-2 0.933, ws 0.418). Mean
  across 5: macro 0.7402, min 0.4105, acc 0.7604, top-2 0.9344.

  Vs run_20260501_164658 mean (0.7432 / 0.4621 / 0.7617 / 0.9351):
  macro -0.3, min -5.2, acc -0.1, top-2 -0.1. Smash lifted 1.2%
  (0.597 to 0.609) but ws gave back 5.2%. Neither half hit the
  target. Macro flat because the trade cancelled out.

  Per-class shifts vs run_20260501_164658: smash +1.2%, drive
  +1.5%, passive_drop +1.7%, cross_court_net_shot +1.3%, ws -5.2%,
  rush -2.7%. Push lifted +6.7% in the first run because its low
  F1 dragged its alpha up; here that didn't repeat (-0.4%).

  Next: nothing on CDB has improved meaningfully over the base
  gamma=1 / tau=1 settings from run_20260501_164658. The space
  left to search is gamma=2 (more aggressive per-example
  modulator) or Seesaw-F1 (full pair-aware mitigation matrix).
