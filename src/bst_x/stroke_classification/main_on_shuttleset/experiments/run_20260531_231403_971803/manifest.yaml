notes: |-
  Best S3 0.733 / 0.492, mean 0.738 / 0.482 (test macro / min).

  Excluding norms, bias and embeddings from weight decay produced a new high on the une_v1_14 taxonomy (split_v2) at baseline 1e-2 wd: best macro/min +0.001 / +0.016; mean macro/min +0.003 / +0.014.

  Otherwise, results showed a consistent mild drop on macro F1 and consistent improvement on min-F1. Unsurprising in retrospect given this was an F1 sweep. wd 4e-1 showed the strongest improvement at min-F1 both across best serial and mean: best +0.04, mean +0.027. Crucially, at 0.525, this cleared the 0.5 mark for wrist_smash!
