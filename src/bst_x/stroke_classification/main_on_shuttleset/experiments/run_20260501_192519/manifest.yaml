notes: |
  Follow-up to the first CDB-F1 run (run_20260501_164658), tau
  softened from 1 to 0.5; alpha range narrows from ~0.20-1.80 to
  ~0.48-1.44. Ran on engelbart alongside bourbaki's gamma=0
  follow-up run_20260501_192113. Wanted to check if the alpha shape
  itself was costing the easy classes. Best S2 by macro / acc /
  top-2 (top macro 0.753, top acc 0.772, top-2 0.940), but it
  carries the run-low ws 0.367; top-of-run ws on S5 (0.447). Mean
  macro 0.7452, min 0.4119, acc 0.7665, top-2 0.9389.

  Vs the first run mean (0.7432/0.4621/0.7617/0.9351): macro +0.2,
  min -5.0, acc +0.5, top-2 +0.4. Head metrics roughly match the
  first run but the wrist_smash gain is gone: mean ws 0.412 sits
  back at class-weighted's 0.422. Push gave back its +6.7% pickup
  too (-0.7%). Smash +2.3, drive +2.8, passive_drop +1.1, rush +1.1
  all picked up once ws stopped grabbing recall. With bourbaki's
  gamma=0 run, both tau and gamma clearly had to be that aggressive
  in the first run; soften either and ws drops back. Pair-cap on
  smash next, not more gamma / tau tweaks.
