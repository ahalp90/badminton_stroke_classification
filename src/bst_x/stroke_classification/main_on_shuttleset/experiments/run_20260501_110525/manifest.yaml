notes: |
  Phase 2 class-weighting smoke test (combo A: une_merge_v1_nosides
  + split_v2 + dropunk, label_smoothing=0.15,
  class_weights={wrist_smash: 2.0, smash: 2.0}). Direct comparisons
  against LS=0.15 run_20260501_073430 (same hparams + pair-balanced
  class_weights added) and LS=0.1 baseline run_20260430_170325.
  Best S2 by wrist_smash (top min 0.518, macro 0.751, acc 0.766,
  top-2 0.936). Mean macro 0.748, min 0.422, acc 0.770, top-2 0.936.

  **New project-wide ceiling on wrist_smash F1.** S2 0.518 is the
  highest per-serial wrist_smash across all 25 nosides serials run
  to date (prior best 0.46 LS=0.1 S5, +6 pp), and the first nosides
  serial to clear 0.50. Two further ceiling-breakers from S4 of
  this same run: macro 0.756 (prior best LS=0.15 S3 = 0.753, +0.3
  pp) and acc 0.777 (prior best LS=0.15 S3 = 0.773, +0.4 pp). Drive
  also lifts: S4 0.66 vs prior best 0.64 (LS=0.0 S4), +2 pp. Other
  bottom-5 classes (smash, drop, passive_drop, push,
  cross_court_net_shot) within 1 pp of prior bests, no meaningful
  movement.

  Mean shift vs LS=0.15 alone (0.747 / 0.417 / 0.769 / 0.938) is
  flat: macro +0.001, min +0.005, acc +0.001, top-2 -0.002. Smash
  mean 0.653 vs 0.648 at LS=0.15 alone. So the pair-balanced
  reweighting didn't move the central tendency, but it did widen
  the wrist_smash range from 0.066 (LS=0.15) to 0.143 in this run
  run, and the wide end is a new high. Read as: bimodal seed
  distribution; one seed (S2) found a wrist_smash basin that no
  prior nosides serial accessed. Adaptive class weighting
  candidate strengthened, not weakened, by this evidence. Full
  writeup in bst_x_overview.md.
