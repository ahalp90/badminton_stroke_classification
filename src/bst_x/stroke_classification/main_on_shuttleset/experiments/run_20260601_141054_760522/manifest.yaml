notes: |-
  SET 1: wd 1e-2 vs 4e-1, both holding norms/bias/embeddings out of decay (now the default in bst_train.py), focal_alpha_revert off, across the five non-une combos. une's two endpoints came from the earlier wd sweep (#40, #47). The old Series G standard decayed all layers at wd 1e-2.

  Best serial / 5-serial mean, test (macro / min), with Series G mean min for comparison:

    cell            wd    best              mean           G std mean min
    shuttleset/v2   1e-2  S5 0.663 / n/a    0.655 / n/a    n/a
    shuttleset/v2   4e-1  S5 0.672 / n/a    0.659 / n/a    n/a
    bst_24/v2       1e-2  S3 0.818 / 0.626  0.811 / 0.557  0.534
    bst_24/v2       4e-1  S3 0.822 / 0.641  0.813 / 0.588  0.534
    bst_12/v2       1e-2  S3 0.818 / 0.623  0.814 / 0.612  0.599
    bst_12/v2       4e-1  S5 0.815 / 0.636  0.810 / 0.603  0.599
    bst_25/baseline 1e-2  S1 0.827 / 0.625  0.816 / 0.548  0.620
    bst_25/baseline 4e-1  S1 0.829 / 0.653  0.822 / 0.614  0.620
    bst_24/baseline 1e-2  S1 0.834 / 0.636  0.830 / 0.624  0.568
    bst_24/baseline 4e-1  S3 0.835 / 0.656  0.832 / 0.631  0.568
    (shuttleset min is driven_flight, one test clip, n/a)

  Macro stayed flat across all settings on every combo. All the movement was on min-F1.

  Between the two endpoints, wd 4e-1 gave the higher min-F1 on bst_24 (both splits) and une, sat within noise of wd 1e-2 on bst_12, and beat wd 1e-2 on bst_25. Against the old standard, wd 4e-1 lifted mean min from 0.534 to 0.588 on bst_24/v2, 0.568 to 0.631 on bst_24/baseline, and 0.471 to 0.498 on une. On bst_12, wd 1e-2 already had the lift over the old standard and 4e-1 added nothing. On bst_25 (keep-unknown) both endpoints came in below the old standard (wd 1e-2 at 0.548, wd 4e-1 at 0.614 against 0.620), so the old standard stays best there. shuttleset_18's min-F1 is driven_flight and not meaningful.

  The three combos wd 4e-1 helped are the three that started with the lowest min-F1; the two highest (bst_12, bst_25) did not move. Default optimiser setting: wd 4e-1. Best or near-best min-F1 on every combo, at most about 0.9% below the best (on bst_12), so one setting holds across taxonomies without per-taxonomy tuning.

  Old standards (Series G): shuttleset run_20260530_161525_131279, bst_24/v2 run_20260530_174818_410060, bst_12 run_20260530_192738_970644, bst_25 run_20260530_210600_435552, bst_24/baseline run_20260530_225714_593038.
