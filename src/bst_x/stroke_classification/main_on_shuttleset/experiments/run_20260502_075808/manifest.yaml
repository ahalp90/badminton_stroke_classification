notes: |
  Combo A nosides + LS=0.0 + adaptive_focal {tau=1, gamma=2,
  momentum=0.9, warm_up=5, f1_floor=0}. Single-knob change vs the
  first CDB-F1 run (run_20260501_164658): gamma 1 -> 2 (the focal
  literature default from Lin et al.).

  Gamma=2 didn't lift the floor. Mean across 5: macro 0.7359, min
  0.4207, acc 0.7559, top-2 0.9346. Vs run_20260501_164658 mean
  (0.7432 / 0.4621 / 0.7617 / 0.9351): macro -0.7, min -4.1, acc
  -0.6, top-2 -0.1. The aggressive per-example modulator squeezed
  ws rather than amplifying it.

  Best S3 by ws (0.4873, run-high, on a par with the first CDB-F1
  S2's 0.4863). Macro 0.7330 and acc 0.7494 are bottom-half of the
  run; S3 smash 0.5796 is run-low. S1 has top macro/acc but
  mid-pack ws (0.4208). Flagging S3 because it shows what gamma=2
  can do at the bottleneck even though the run mean didn't lift.

  Per-class shifts vs run_20260501_164658: smash +1.3% (close to
  the pair-cap's +1.2%), ws -4.1%, push -2.3% (auto-bottleneck
  pickup didn't repeat, same as the pair-cap), services -1.0 to
  -1.3%, others mostly -0.5 to -1.0%. Ws range widened from 0.073
  to 0.108: seed variance got worse on the bottleneck class.
  Last untouched CDB knob, now tested. Only Seesaw-F1 or two-stage
  cRT/LWS left to try on the loss-side budget.
