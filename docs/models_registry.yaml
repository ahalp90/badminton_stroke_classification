# Hand-curated registry of FE-facing models.
# Schema and consumer contract: ../scratch/frontend_integration_handoff.md  section 1.
# Add a new entry when a run/serial graduates to user-facing status.
#
# Tier 1 (current): the backend joins each entry's `manifest.yaml` (headline +
# val metrics) with its FE sidecar JSONs. BST-X parks those under the run's
# `fe_jsons/` dir (clip_index, {split}.json, perclass_stats_{split}.json); BRIC
# uses `predictions/` + `eval/test_summary.json`. See src/api/registry.py.
# Tier 2 (later): the same registry drives weight loading + npy lookup.
#
# Provenance (collation_id, ablation_id) and the class list are read off each
# entry's manifest `config` block, not duplicated here.
# `temperature: 1.0` means no calibration applied yet (raw softmax).
# Proper temperature-scaling fit is parked at section 6.5 of the long doc.
#
# Six taxon_pinned_w_preds BST-X cells were trained (taxonomies bst_12/18/24/25
# and une_v1_14, across v2 + BST-baseline splits). All six are surfaced. The FE
# shows the `is_default: true` cell (une_v1_14 on v2, the like-for-like match to
# BRIC's 14-class v2 footing) as the headline BST-X card, and lets the user swap
# in any of the other five via the "Change model" picker. Exactly one BST-X entry
# should carry is_default; the FE falls back to the first model otherwise.

models:
  - id: bst_x_une_v1_14_v2
    display_name: "BST-X, une_v1_14 (v2 split)"
    is_default: true
    description: |
      14-class une_v1_14 taxonomy (bst_12 + wrist_smash + passive_drop),
      taxon-pinned collation, v2 split. Macro F1 0.751, min F1 0.485,
      accuracy 0.770 on held-out test (serial 3).
    architecture: bst-x
    run_id: run_20260531_005535_005154
    serial_no: 3
    taxonomy: une_v1_14
    split_column: split_v2
    drop_unknown: true
    temperature: 1.0
    num_classes: 14
    manifest_path: src/bst_refactor/stroke_classification/main_on_shuttleset/experiments/run_20260531_005535_005154/manifest.yaml
    weights_path: src/bst_refactor/stroke_classification/main_on_shuttleset/experiments/run_20260531_005535_005154/weights/bst_CG_AP_JnB_bone_between_2_hits_with_max_limits_seq_100_une_v1_14_3.pt

